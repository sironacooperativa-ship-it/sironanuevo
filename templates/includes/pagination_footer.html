{% if page_obj and page_obj.paginator.num_pages > 1 %}
  <div class="card-footer d-flex flex-wrap justify-content-between align-items-center gap-2 small">
    <span>Página {{ page_obj.number }} de {{ page_obj.paginator.num_pages }}</span>
    <div class="d-flex gap-2">
      {% if page_obj.has_previous %}
        <a class="btn btn-sm btn-outline-secondary" href="?{% if querystring %}{{ querystring }}&amp;{% endif %}page={{ page_obj.previous_page_number }}">Anterior</a>
      {% endif %}
      {% if page_obj.has_next %}
        <a class="btn btn-sm btn-outline-secondary" href="?{% if querystring %}{{ querystring }}&amp;{% endif %}page={{ page_obj.next_page_number }}">Siguiente</a>
      {% endif %}
    </div>
  </div>
{% endif %}
