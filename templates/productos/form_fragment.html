{# Respuesta solo para modal (fetch ?modal=1). Sin {% extends %}. #}
<form method="post" action="{{ form_action_url }}" class="sirona-modal-form">
  {% csrf_token %}
  <input type="hidden" name="retorno_query" value="{{ retorno_query|default:'' }}" />
  <input type="hidden" name="listas_extra_present" value="1" />
  <div class="modal-header producto-modal-head border-0 pb-2 align-items-center">
    <h5 class="modal-title producto-modal-title mb-0">Editar producto</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
  </div>
  <div class="modal-body producto-modal-body pt-0 px-3 px-md-4">
    {% include "productos/includes/product_form_fields_compact.html" %}
  </div>
  <div class="modal-footer producto-modal-foot border-0 bg-transparent pt-2 px-3 px-md-4 pb-3">
    <button type="button" class="btn btn-outline-secondary btn-sm rounded-pill px-4" data-bs-dismiss="modal">Cancelar</button>
    <button type="submit" class="btn btn-primary btn-sm rounded-pill px-4">Guardar cambios</button>
  </div>
</form>

<script>
  (function () {
    try {
      const root = document.getElementById("sironaModal");
      const dlg = root ? root.querySelector(".modal-dialog") : null;
      if (!dlg) return;
      dlg.classList.remove("modal-dialog-scrollable");
      dlg.classList.add("modal-dialog-centered", "sirona-modal-dialog--product");
      if (typeof lucide !== "undefined") {
        try { lucide.createIcons(); } catch (e) {}
      }
    } catch (e) {}
  })();
</script>
