{% extends "base.html" %}
{% block title %}Renombrar lista{% endblock %}
{% block content %}
  <div class="app-page-header mb-3">
    <h1 class="app-page-title mb-1">Renombrar lista</h1>
  </div>
  <div class="card app-card border-0 shadow-sm" style="max-width: 32rem">
    <div class="card-body p-3">
      <form method="post">
        {% csrf_token %}
        <label class="form-label small text-muted">Nombre</label>
        <input type="text" name="nombre" class="form-control rounded-3 mb-3" required maxlength="100" value="{{ lista.nombre }}" />
        <div class="d-flex gap-2">
          <a class="btn btn-outline-secondary rounded-pill" href="{% url 'lista_precios_trabajar' lista.pk %}">Cancelar</a>
          <button type="submit" class="btn btn-primary rounded-pill">Guardar</button>
        </div>
      </form>
    </div>
  </div>
{% endblock %}
