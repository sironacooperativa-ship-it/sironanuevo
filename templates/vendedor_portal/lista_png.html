{% extends "base.html" %}
{% block title %}{{ titulo }}{% endblock %}
{% block content %}
  <div class="vendedor-portal-page">
  <div class="d-flex flex-wrap align-items-center justify-content-between gap-2 mb-3 vendedor-portal-toolbar">
    <div>
      <h1 class="h5 mb-1">{{ titulo }}</h1>
      <div class="text-muted small">Generá un PNG para compartir desde el celular.</div>
    </div>
    <div class="d-flex gap-2">
      <a class="btn btn-outline-secondary btn-sm" href="{% url 'vendedor_listas' %}">Volver</a>
      <a class="btn btn-outline-primary btn-sm" href="{% url 'vendedor_lista_pdf' slug %}">PDF</a>
      <a class="btn btn-outline-primary btn-sm" href="{% url 'vendedor_lista_excel' slug %}">Excel</a>
    </div>
  </div>

  {{ productos|json_script:"lp-productos" }}

  <div class="card app-card border-0 shadow-sm mb-3">
    <div class="card-body">
      <div class="row g-2 align-items-end">
        <div class="col-12 col-md-4">
          <label class="form-label small text-muted mb-1" for="inpPage">Página</label>
          <input type="number" class="form-control vportal-filter-control" id="inpPage" min="1" value="1" />
        </div>
        <div class="col-12 col-md-4">
          <label class="form-label small text-muted mb-1" for="inpPageSize">Filas por página</label>
          <input type="number" class="form-control vportal-filter-control" id="inpPageSize" min="10" max="60" value="35" />
        </div>
        <div class="col-12 col-md-4 d-grid">
          <label class="form-label small text-muted mb-1 d-none d-md-block">&nbsp;</label>
          <button class="btn btn-primary vportal-filter-btn" type="button" id="btnRender">Generar</button>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 mt-3">
        <button class="btn btn-outline-primary btn-sm rounded-pill" type="button" id="btnDownload" disabled>Descargar PNG</button>
        <button class="btn btn-outline-secondary btn-sm rounded-pill" type="button" id="btnShare" disabled>Compartir</button>
      </div>
      <div class="text-muted small mt-2" id="meta"></div>
    </div>
  </div>

  <div class="card app-card border-0 shadow-sm">
    <div class="card-body">
      <div class="text-muted small mb-2">Vista previa</div>
      <canvas id="cnv" style="max-width: 100%; height: auto; border: 1px solid #eee;"></canvas>
    </div>
  </div>

  <script>
    (function () {
      const productosEl = document.getElementById("lp-productos");
      const productos = productosEl ? JSON.parse(productosEl.textContent) : [];
      const cnv = document.getElementById("cnv");
      const meta = document.getElementById("meta");
      const btnRender = document.getElementById("btnRender");
      const btnDownload = document.getElementById("btnDownload");
      const btnShare = document.getElementById("btnShare");
      const inpPage = document.getElementById("inpPage");
      const inpPageSize = document.getElementById("inpPageSize");

      const EXPORT_SCALE = 2;

      function clamp(n, a, b) {
        n = Number(n || 0);
        if (!Number.isFinite(n)) n = a;
        return Math.max(a, Math.min(b, n));
      }

      function render() {
        const pageSize = clamp(inpPageSize.value, 10, 60);
        const pages = Math.max(1, Math.ceil(productos.length / pageSize));
        const page = clamp(inpPage.value, 1, pages);
        inpPage.value = String(page);

        const start = (page - 1) * pageSize;
        const chunk = productos.slice(start, start + pageSize);

        const w = 1080;
        const pad = 48;
        const headerH = 150;
        const rowH = 54;
        const h = headerH + pad + Math.max(1, chunk.length) * rowH + pad;
        cnv.width = Math.round(w * EXPORT_SCALE);
        cnv.height = Math.round(h * EXPORT_SCALE);
        const ctx = cnv.getContext("2d");
        if (!ctx) return;
        ctx.imageSmoothingEnabled = true;
        ctx.imageSmoothingQuality = "high";
        ctx.scale(EXPORT_SCALE, EXPORT_SCALE);
        const strokeW = 2 / EXPORT_SCALE;

        ctx.fillStyle = "#ffffff";
        ctx.fillRect(0, 0, w, h);

        // Header
        ctx.fillStyle = "#0097B2";
        ctx.fillRect(0, 0, w, headerH);
        ctx.fillStyle = "#ffffff";
        ctx.font = "bold 42px system-ui, -apple-system, Segoe UI, Arial";
        ctx.fillText("{{ titulo|escapejs }}", pad, 62);
        ctx.font = "26px system-ui, -apple-system, Segoe UI, Arial";
        const fecha = new Date().toLocaleDateString("es-AR");
        ctx.fillText("Fecha: " + fecha + "  ·  Página " + page + "/" + pages, pad, 112);

        // Table headers
        let y = headerH + 18;
        ctx.fillStyle = "#505050";
        ctx.font = "22px system-ui, -apple-system, Segoe UI, Arial";
        ctx.fillText("Código", pad, y + 22);
        ctx.fillText("Tipo", pad + 160, y + 22);
        ctx.fillText("Descripción", pad + 360, y + 22);
        ctx.textAlign = "right";
        ctx.fillText("Precio", w - pad - 10, y + 22);
        ctx.textAlign = "left";
        y += 42;
        ctx.strokeStyle = "#dcdcdc";
        ctx.lineWidth = strokeW;
        ctx.beginPath();
        ctx.moveTo(pad, y);
        ctx.lineTo(w - pad, y);
        ctx.stroke();
        y += 18;

        ctx.font = "26px system-ui, -apple-system, Segoe UI, Arial";
        for (let i = 0; i < chunk.length; i++) {
          const p = chunk[i];
          if (i % 2 === 1) {
            ctx.fillStyle = "#f0f9fb";
            ctx.fillRect(0, y - 8, w, rowH);
          }
          ctx.fillStyle = "#1e1e1e";
          ctx.fillText(String(p.codigo || ""), pad, y + 30);
          ctx.fillText(String(p.tipo || ""), pad + 160, y + 30);
          let desc = String(p.descripcion || "");
          if (desc.length > 32) desc = desc.slice(0, 29) + "...";
          ctx.fillText(desc, pad + 360, y + 30);
          ctx.textAlign = "right";
          ctx.fillText(String(p.precio || ""), w - pad - 10, y + 30);
          ctx.textAlign = "left";
          y += rowH;
        }

        meta.textContent = "Productos: " + productos.length + " · Página " + page + "/" + pages + " · Filas: " + chunk.length;

        btnDownload.disabled = false;
        btnShare.disabled = false;
      }

      const pngFilename = "{{ slug|escapejs }}.png";

      function canvasToBlob() {
        return new Promise((resolve) => {
          cnv.toBlob((b) => resolve(b), "image/png");
        });
      }

      function triggerBlobDownload(blob) {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = pngFilename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 5000);
      }

      btnRender.addEventListener("click", render);

      btnDownload.addEventListener("click", async function () {
        const blob = await canvasToBlob();
        if (!blob) return;
        triggerBlobDownload(blob);
      });

      btnShare.addEventListener("click", async function () {
        const blob = await canvasToBlob();
        if (!blob) return;
        triggerBlobDownload(blob);
        const file = new File([blob], pngFilename, { type: "image/png" });
        if (navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          try {
            await navigator.share({ title: "Lista de precios", files: [file] });
            return;
          } catch (e) {}
        }
        alert(
          "Ya se descargó el mismo PNG que «Descargar PNG». Si no se abrió el menú para compartir, adjuntalo en WhatsApp desde descargas."
        );
      });

      render();
    })();
  </script>
  </div>
{% endblock %}
