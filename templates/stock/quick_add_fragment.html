{# Modal: agregar stock rápido (venta / presupuesto) #}
<div
  class="p-0"
  data-sirona-dialog-class="modal-md"
  data-sirona-dialog-centered="1"
>
  <div class="modal-header border-0 pb-0">
    <h5 class="modal-title mb-0">Agregar stock</h5>
    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
  </div>
  <div class="modal-body">
    <p class="mb-2">
      <strong>{{ producto.codigo }}</strong> — {{ producto.descripcion }}
    </p>
    <p class="text-muted small mb-3">
      Stock actual: <strong>{{ producto.stock }}</strong> u.
    </p>
    <form
      method="post"
      action="{% url 'stock_quick_add' producto.pk %}"
      class="js-stock-quick-add row g-2 align-items-end"
    >
      {% csrf_token %}
      <div class="col-8">
        <label class="form-label" for="id_cantidad_entrada">Unidades a ingresar</label>
        <input
          type="number"
          name="cantidad"
          id="id_cantidad_entrada"
          class="form-control"
          min="1"
          step="1"
          required
          autofocus
          placeholder="Ej. 10"
        />
      </div>
      <div class="col-4 d-grid">
        <button type="submit" class="btn btn-primary">Guardar</button>
      </div>
    </form>
  </div>
</div>
