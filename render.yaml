services:
  - type: web
    name: sirona
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn coop_manager.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "0"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: SECURE_SSL_REDIRECT
        value: "1"
      - key: SECRET_KEY
        generateValue: true
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      # IMPORTANTE:
      # En el plan free, Render Postgres expira a los 30 días.
      # Para mantenerlo gratis sin vencimiento, creá una DB gratis externa (Neon/Supabase)
      # y cargá DATABASE_URL como variable de entorno en Render.

